#models:
 # ifiok_dbt_proj:
    # Config indicated by + and applies to all files under models/example/
  #  models:
  #ifiok_dbt_proj:
   # Marts:
    #  +materialized: table

     # snownflake_warehouse: ifiok_warehouse
    #staging:
     # +materialized: view
     # snownflake_warehouse: ifiok_warehous
name: 'ifiok_dbt_proj'
version: '1.0.0'

profile: 'ifiok_dbt_proj'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  ifiok_dbt_proj:
    staging:
      +materialized: table
      warehouse: compute_wh (just a comment if needed)

    Marts:
      +materialized: table
      warehouse: ifiok_warehouse
    dim:
       +materialized: ephemeral
vars:
  start_date: 2021/12/12

